<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <div class="yt-embed-holder">
        <iframe width="1185" height="583" src="https://www.youtube.com/embed/hB7CDrVnNCs?autoplay=1" allow="autoplay" allowfullscreen></iframe>
    </div>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
        }
        .yt-embed-holder {
            width: 100%;

            height: 100%;
            margin-left: -100%;
